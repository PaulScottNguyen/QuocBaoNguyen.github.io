<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
</head>

<body>
  <h1>NAV TEST</h1>
  <p>Tabs count: {{ site.tabs | size }}</p>

<nav>
  <a href="/">Home</a>

  {% assign sorted_tabs = site.tabs | sort: "order" %}

  {% for tab in sorted_tabs %}
    <a href="{{ tab.url | relative_url }}">{{ tab.title }}</a>
  {% endfor %}
</nav>

<hr>

<main>
  {{ content }}
</main>

</body>
</html>
